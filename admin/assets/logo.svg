<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 48" role="img" aria-label="Sail Race Tracker">
  <defs>
    <linearGradient id="mk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E6BFF"/>
      <stop offset="1" stop-color="#0B1B30"/>
    </linearGradient>
  </defs>
  <!-- mark: app-icon style sail + GPS ping -->
  <g transform="translate(4,4)">
    <rect width="40" height="40" rx="11" fill="url(#mk)"/>
    <!-- mainsail -->
    <path d="M21 9 L21 30 L10.5 30 Q19 22 21 9 Z" fill="#fff"/>
    <!-- jib -->
    <path d="M23 13 L23 30 L30.5 30 Q26 22 23 13 Z" fill="#fff" opacity="0.55"/>
    <!-- hull -->
    <path d="M8 31.5 Q20 37 32 31.5" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
    <!-- ping -->
    <circle cx="31" cy="11" r="3.4" fill="#FF5A3C"/>
  </g>
  <!-- wordmark (ink — for light backgrounds) -->
  <g fill="#0E1B2C" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif" font-weight="700">
    <text x="56" y="22" font-size="16.5" letter-spacing="1">SAIL RACE</text>
    <text x="56" y="39" font-size="16.5" letter-spacing="1">TRACKER</text>
  </g>
</svg>
